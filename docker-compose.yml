version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: roammates-postgres
    environment:
      POSTGRES_DB: roammates
      POSTGRES_USER: roammates_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: roammates-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres-data:
